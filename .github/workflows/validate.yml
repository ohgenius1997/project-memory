name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check script syntax
        run: |
          PYTHONPYCACHEPREFIX=/tmp/project-memory-pycache \
            python -m py_compile skills/project-memory/scripts/*.py

      - name: Validate skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          skill = Path("skills/project-memory/SKILL.md")
          text = skill.read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              sys.exit("SKILL.md must start with YAML frontmatter")
          try:
              _, frontmatter, _ = text.split("---", 2)
          except ValueError:
              sys.exit("SKILL.md frontmatter is not closed")
          fields = {}
          for line in frontmatter.splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip()
          if fields.get("name") != "project-memory":
              sys.exit("SKILL.md name must be project-memory")
          if not fields.get("description"):
              sys.exit("SKILL.md description is required")
          PY

      - name: Smoke test initialization
        run: |
          python skills/project-memory/scripts/init_docs.py \
            --target /tmp/project-memory-smoke-min \
            --project-name "Smoke Minimal"

          python skills/project-memory/scripts/init_docs.py \
            --target /tmp/project-memory-smoke-standard \
            --project-name "Smoke Standard" \
            --profile standard

          python skills/project-memory/scripts/init_docs.py \
            --target /tmp/project-memory-smoke-governed \
            --project-name "Smoke Governed" \
            --profile governed

          python skills/project-memory/scripts/init_docs.py \
            --target /tmp/project-memory-smoke-none \
            --project-name "Smoke None" \
            --profile standard \
            --dynamic-memory none

          test "$(find /tmp/project-memory-smoke-min -type f | wc -l | tr -d ' ')" = "1"
          test -f /tmp/project-memory-smoke-standard/PROJECT_STATUS.md
          test -f /tmp/project-memory-smoke-governed/docs/COORDINATION.md
          test -f /tmp/project-memory-smoke-none/docs/LOG.md

          python skills/project-memory/scripts/brief_memory.py --target /tmp/project-memory-smoke-min
          python skills/project-memory/scripts/diagnose_memory.py --target /tmp/project-memory-smoke-none
          python skills/project-memory/scripts/diagnose_memory.py --target /tmp/project-memory-smoke-standard --context-gate
          python skills/project-memory/scripts/status_sync_proposal.py --target /tmp/project-memory-smoke-standard
          python skills/project-memory/scripts/inspect_project.py --target /tmp/project-memory-smoke-min
          python skills/project-memory/scripts/compact_memory.py --target /tmp/project-memory-smoke-min
          python skills/project-memory/scripts/migrate_agents.py --target /tmp/project-memory-smoke-min
          python skills/project-memory/scripts/migrate_context.py --target /tmp/project-memory-smoke-min
