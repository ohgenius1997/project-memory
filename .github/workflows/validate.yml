name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill:
    env:
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/project-memory-pycache
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check script syntax
        run: python -m compileall -q skills/project-memory/scripts tests

      - name: Run behavior tests
        run: python -m unittest discover -s tests
